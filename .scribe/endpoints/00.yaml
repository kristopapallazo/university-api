      -
        custom: []
        status: 403
        content: '{"data": null, "message": "Student\u00ebt hyjn\u00eb vet\u00ebm me Google OAuth.", "status": 403}'
        headers: []
        description: 'Student tried email login'
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
  -
    custom: []
    httpMethods:
      - GET
    uri: api/v1/auth/google/redirect
    metadata:
      custom: []
      groupName: Authentication
      groupDescription: ''
      subgroup: ''
      subgroupDescription: ''
      title: 'Google OAuth — redirect'
      description: |-
        Redirects the browser to Google's consent screen.
        Open this URL directly in the browser; **do not** call it via fetch/axios.
        Accepts university emails: `@uamd.edu.al` (staff) and `@students.uamd.edu.al` (students).
      authenticated: false
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
      -
        custom: []
        status: 302
        content: |-
          <!DOCTYPE html>
          <html>
              <head>
                  <meta charset="UTF-8" />
                  <meta http-equiv="refresh" content="0;url='https://accounts.google.com/o/oauth2/auth?client_id=&amp;redirect_uri=http%3A%2F%2F127.0.0.1%3A8000%2Fapi%2Fv1%2Fauth%2Fgoogle%2Fcallback&amp;scope=openid+profile+email&amp;response_type=code'" />

                  <title>Redirecting to https://accounts.google.com/o/oauth2/auth?client_id=&amp;redirect_uri=http%3A%2F%2F127.0.0.1%3A8000%2Fapi%2Fv1%2Fauth%2Fgoogle%2Fcallback&amp;scope=openid+profile+email&amp;response_type=code</title>
              </head>
              <body>
                  Redirecting to <a href="https://accounts.google.com/o/oauth2/auth?client_id=&amp;redirect_uri=http%3A%2F%2F127.0.0.1%3A8000%2Fapi%2Fv1%2Fauth%2Fgoogle%2Fcallback&amp;scope=openid+profile+email&amp;response_type=code">https://accounts.google.com/o/oauth2/auth?client_id=&amp;redirect_uri=http%3A%2F%2F127.0.0.1%3A8000%2Fapi%2Fv1%2Fauth%2Fgoogle%2Fcallback&amp;scope=openid+profile+email&amp;response_type=code</a>.
              </body>
          </html>
        headers:
          cache-control: 'no-cache, private'
          location: 'https://accounts.google.com/o/oauth2/auth?client_id=&redirect_uri=http%3A%2F%2F127.0.0.1%3A8000%2Fapi%2Fv1%2Fauth%2Fgoogle%2Fcallback&scope=openid+profile+email&response_type=code'
          content-type: 'text/html; charset=utf-8'
          x-ratelimit-limit: '10'
          x-ratelimit-remaining: '9'
          vary: Origin
        description: null
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
  -
    custom: []
    httpMethods:
      - GET
    uri: api/v1/auth/google/callback
    metadata:
      custom: []
      groupName: Authentication
      groupDescription: ''
      subgroup: ''
      subgroupDescription: ''
      title: 'Google OAuth — callback'
      description: |-
        Handles Google's redirect back. Looks up the email in the system to determine
        the user's role (student, pedagog, or admin). Unknown emails are rejected.
        On success, redirects to the SPA with a token in the URL.
      authenticated: false
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
      -
        custom: []
        status: 302
        content: 'Redirects to FRONTEND_URL/auth/callback?token=...'
        headers: []
        description: Success
      -
        custom: []
        status: 302
        content: 'Redirects to FRONTEND_URL/login?error=oauth_unknown_email'
        headers: []
        description: 'Unknown email'
      -
        custom: []
        status: 302
        content: 'Redirects to FRONTEND_URL/login?error=oauth_failed'
        headers: []
        description: 'OAuth error'
      -
        custom: []
        status: 302
        content: |-
          <!DOCTYPE html>
          <html>
              <head>
                  <meta charset="UTF-8" />
                  <meta http-equiv="refresh" content="0;url='http://localhost:5173/login?error=oauth_failed'" />

                  <title>Redirecting to http://localhost:5173/login?error=oauth_failed</title>
              </head>
              <body>
                  Redirecting to <a href="http://localhost:5173/login?error=oauth_failed">http://localhost:5173/login?error=oauth_failed</a>.
              </body>
          </html>
        headers:
          cache-control: 'no-cache, private'
          location: 'http://localhost:5173/login?error=oauth_failed'
          content-type: 'text/html; charset=utf-8'
          x-ratelimit-limit: '10'
          x-ratelimit-remaining: '9'
          vary: Origin
        description: null
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
