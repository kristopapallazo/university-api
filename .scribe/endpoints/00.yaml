name: Authentication
description: ''
endpoints:
  -
    custom: []
    httpMethods:
      - POST
    uri: api/v1/auth/login
    metadata:
      custom: []
      groupName: Authentication
      groupDescription: ''
      subgroup: ''
      subgroupDescription: ''
      title: 'Login (pedagog / admin)'
      description: |-
        Returns a Sanctum token for pedagog and admin users.
        Students must use the Google OAuth flow instead.
      authenticated: false
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      email:
        custom: []
        name: email
        description: 'Adresa email e pedagog-ut ose admin-it. Must be a valid email address.'
        required: true
        example: arjan.hoxha@uamd.edu.al
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      password:
        custom: []
        name: password
        description: Fjalëkalimi.
        required: true
        example: secret123
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
    cleanBodyParameters:
      email: arjan.hoxha@uamd.edu.al
      password: secret123
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: |-
          {
            "data": {"user": {"id": 1, "name": "Arjan Hoxha", "email": "arjan@uamd.edu.al", "role": "pedagog"}, "token": "1|abc..."},
            "message": "Hyrja u krye me sukses.",
            "status": 200
          }
        headers: []
        description: Success
      -
        custom: []
        status: 401
        content: '{"data": null, "message": "Email ose fjal\u00ebkalimi i gab\u00fear.", "status": 401}'
        headers: []
        description: 'Wrong credentials'
      -
        custom: []
        status: 403
        content: '{"data": null, "message": "Studen\u00ebtët p\u00ebrdorin Google.", "status": 403}'
        headers: []
        description: 'Student tried email login'
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
  -
    custom: []
    httpMethods:
      - GET
    uri: api/v1/auth/google/redirect
    metadata:
      custom: []
      groupName: Authentication
      groupDescription: ''
      subgroup: ''
      subgroupDescription: ''
      title: 'Google OAuth — redirect'
      description: |-
        Redirects the browser to Google's consent screen.
        Open this URL directly in the browser; **do not** call it via fetch/axios.
        Only @students.uamd.edu.al accounts are accepted.
      authenticated: false
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
      -
        custom: []
        status: 302
        content: |-
          <!DOCTYPE html>
          <html>
              <head>
                  <meta charset="UTF-8" />
                  <meta http-equiv="refresh" content="0;url='https://accounts.google.com/o/oauth2/auth?client_id=&amp;redirect_uri=http%3A%2F%2F127.0.0.1%3A8000%2Fapi%2Fv1%2Fauth%2Fgoogle%2Fcallback&amp;scope=openid+profile+email&amp;response_type=code&amp;hd=students.uamd.edu.al'" />

                  <title>Redirecting to https://accounts.google.com/o/oauth2/auth?client_id=&amp;redirect_uri=http%3A%2F%2F127.0.0.1%3A8000%2Fapi%2Fv1%2Fauth%2Fgoogle%2Fcallback&amp;scope=openid+profile+email&amp;response_type=code&amp;hd=students.uamd.edu.al</title>
              </head>
              <body>
                  Redirecting to <a href="https://accounts.google.com/o/oauth2/auth?client_id=&amp;redirect_uri=http%3A%2F%2F127.0.0.1%3A8000%2Fapi%2Fv1%2Fauth%2Fgoogle%2Fcallback&amp;scope=openid+profile+email&amp;response_type=code&amp;hd=students.uamd.edu.al">https://accounts.google.com/o/oauth2/auth?client_id=&amp;redirect_uri=http%3A%2F%2F127.0.0.1%3A8000%2Fapi%2Fv1%2Fauth%2Fgoogle%2Fcallback&amp;scope=openid+profile+email&amp;response_type=code&amp;hd=students.uamd.edu.al</a>.
              </body>
          </html>
        headers:
          cache-control: 'no-cache, private'
          location: 'https://accounts.google.com/o/oauth2/auth?client_id=&redirect_uri=http%3A%2F%2F127.0.0.1%3A8000%2Fapi%2Fv1%2Fauth%2Fgoogle%2Fcallback&scope=openid+profile+email&response_type=code&hd=students.uamd.edu.al'
          content-type: 'text/html; charset=utf-8'
          vary: Origin
        description: null
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
