      groupName: Authentication
      groupDescription: ''
      subgroup: ''
      subgroupDescription: ''
      title: 'Login (pedagog / admin)'
      description: |-
        Returns a Sanctum token for pedagog and admin users.
        Students must use the Google OAuth flow instead.
      authenticated: false
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      email:
        custom: []
        name: email
        description: 'Adresa email e pedagog-ut ose admin-it. Must be a valid email address.'
        required: true
        example: arjan.hoxha@uamd.edu.al
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      password:
        custom: []
        name: password
        description: Fjalëkalimi.
        required: true
        example: secret123
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
    cleanBodyParameters:
      email: arjan.hoxha@uamd.edu.al
      password: secret123
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: |-
          {
            "data": {"user": {"id": 1, "name": "Arjan Hoxha", "email": "arjan@uamd.edu.al", "role": "pedagog"}, "token": "1|abc..."},
            "message": "Hyrja u krye me sukses.",
            "status": 200
          }
        headers: []
