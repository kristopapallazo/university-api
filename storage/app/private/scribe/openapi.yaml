              schema:
                type: object
                example:
                  data: null
                  message: 'Nuk jeni i autentikuar.'
                  status: 401
                properties:
                  data:
                    type: string
                    example: null
                    nullable: true
                  message:
                    type: string
                    example: 'Nuk jeni i autentikuar.'
                  status:
                    type: integer
                    example: 401
      tags:
        - Endpoints
  '/api/v1/notifications/{id}/read':
    put:
      summary: ''
      operationId: putApiV1NotificationsIdRead
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
    parameters:
      -
        in: path
        name: id
        description: 'The ID of the notification.'
        example: architecto
        required: true
        schema:
          type: string
  /api/v1/notifications/read-all:
    put:
      summary: ''
      operationId: putApiV1NotificationsReadAll
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
  /api/v1/admin/notifications:
    post:
      summary: ''
      operationId: postApiV1AdminNotifications
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: 'Must not be greater than 200 characters.'
                  example: b
                body:
                  type: string
                  description: ''
                  example: architecto
                type:
                  type: string
                  description: ''
                  example: architecto
                recipient_role:
                  type: string
                  description: ''
                  example: null
                  nullable: true
                recipient_user_id:
                  type: integer
                  description: 'The <code>id</code> of an existing record in the users table.'
                  example: 16
                  nullable: true
              required:
                - title
                - body
                - type
