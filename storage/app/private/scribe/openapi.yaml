  /api/v1/faculties:
    get:
      summary: 'List faculties'
      operationId: listFaculties
      description: 'Returns all 6 UAMD faculties ordered by ID.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    -
                      id: 1
                      name: 'Fakulteti i Shkencave të Biznesit'
                    -
                      id: 2
                      name: 'Fakulteti i Shkencave Teknike'
                  message: 'Fakultetet u morën me sukses.'
                  status: 200
                properties:
                  data:
                    type: array
                    example:
                      -
                        id: 1
                        name: 'Fakulteti i Shkencave të Biznesit'
                      -
                        id: 2
                        name: 'Fakulteti i Shkencave Teknike'
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        name:
                          type: string
                          example: 'Fakulteti i Shkencave të Biznesit'
                  message:
                    type: string
                    example: 'Fakultetet u morën me sukses.'
                  status:
                    type: integer
                    example: 200
      tags:
        - Faculties
    post:
      summary: 'Create a faculty'
      operationId: createAFaculty
      description: ''
      parameters: []
      responses:
        501:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data: null
                  message: 'Ende nuk është implementuar.'
                  status: 501
                properties:
                  data:
                    type: string
                    example: null
                    nullable: true
                  message:
                    type: string
                    example: 'Ende nuk është implementuar.'
                  status:
                    type: integer
                    example: 501
      tags:
        - Faculties
  '/api/v1/faculties/{id}':
    get:
      summary: 'Get a faculty'
      operationId: getAFaculty
      description: 'Returns a single faculty by its ID.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    id: 1
                    name: 'Fakulteti i Shkencave të Biznesit'
                  message: 'Fakulteti u mor me sukses.'
                  status: 200
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: 'Fakulteti i Shkencave të Biznesit'
                  message:
                    type: string
                    example: 'Fakulteti u mor me sukses.'
                  status:
                    type: integer
                    example: 200
        404:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data: null
                  message: 'Not Found'
                  status: 404
                properties:
                  data:
                    type: string
                    example: null
                    nullable: true
                  message:
                    type: string
                    example: 'Not Found'
                  status:
                    type: integer
                    example: 404
      tags:
        - Faculties
    put:
      summary: 'Update a faculty'
      operationId: updateAFaculty
      description: ''
