openapi: 3.0.3
info:
  title: 'UAMD Portal API'
  description: 'REST API për Portalin e Universitetit Aleksander Moisiu Durrës (UAMD). Të gjitha endpoint-et janë të prefixuara me /api/v1/.'
  version: 1.0.0
servers:
  -
    url: 'http://localhost:8000'
tags:
  -
    name: Authentication
    description: ''
  -
    name: Courses
    description: ''
  -
    name: Departments
    description: ''
  -
    name: Endpoints
    description: ''
  -
    name: Faculties
    description: ''
  -
    name: Pedagogues
    description: ''
  -
    name: Programs
    description: ''
  -
    name: Reports
    description: ''
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'Merr token-in duke bërë <b>POST /api/v1/auth/login</b> (pedagog/admin) ose OAuth me Google (student).'
security:
  -
    default: []
paths:
  /api/v1/auth/login:
    post:
      summary: 'Login (pedagog / admin)'
      operationId: loginpedagogAdmin
      description: "Returns a Sanctum token for pedagog and admin users.\nStudents must use the Google OAuth flow instead."
      parameters: []
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    user:
                      id: 1
                      name: 'Arjan Hoxha'
                      email: arjan@uamd.edu.al
                      role: pedagog
                    token: 1|abc...
                  message: 'Hyrja u krye me sukses.'
                  status: 200
                properties:
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          name:
                            type: string
                            example: 'Arjan Hoxha'
                          email:
                            type: string
                            example: arjan@uamd.edu.al
                          role:
                            type: string
                            example: pedagog
                      token:
                        type: string
                        example: 1|abc...
                  message:
                    type: string
                    example: 'Hyrja u krye me sukses.'
                  status:
                    type: integer
                    example: 200
        401:
          description: 'Wrong credentials'
          content:
            application/json:
              schema:
                type: object
                example:
                  data: null
                  message: 'Email ose fjalëkalimi i gabþar.'
                  status: 401
                properties:
                  data:
                    type: string
                    example: null
                    nullable: true
                  message:
                    type: string
                    example: 'Email ose fjalëkalimi i gabþar.'
                  status:
                    type: integer
                    example: 401
        403:
          description: 'Student tried email login'
          content:
            application/json:
              schema:
                type: object
                example:
                  data: null
                  message: 'Studentët hyjnë vetëm me Google OAuth.'
                  status: 403
                properties:
                  data:
                    type: string
                    example: null
                    nullable: true
                  message:
                    type: string
                    example: 'Studentët hyjnë vetëm me Google OAuth.'
                  status:
                    type: integer
                    example: 403
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Adresa email e pedagog-ut ose admin-it. Must be a valid email address.'
                  example: arjan.hoxha@uamd.edu.al
                password:
                  type: string
                  description: Fjalëkalimi.
                  example: secret123
              required:
                - email
                - password
      security: []
  /api/v1/auth/google/redirect:
    get:
      summary: 'Google OAuth — redirect'
      operationId: googleOAuthRedirect
      description: "Redirects the browser to Google's consent screen.\nOpen this URL directly in the browser; **do not** call it via fetch/axios.\nAccepts university emails: `@uamd.edu.al` (staff) and `@students.uamd.edu.al` (students)."
      parameters: []
      responses:
        302:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: "<!DOCTYPE html>\n<html>\n    <head>\n        <meta charset=\"UTF-8\" />\n        <meta http-equiv=\"refresh\" content=\"0;url='https://accounts.google.com/o/oauth2/auth?client_id=654902117091-i72uc243ah463bgqsumsvsc60640kp3i.apps.googleusercontent.com&amp;redirect_uri=http%3A%2F%2Flocalhost%3A8000%2Fapi%2Fv1%2Fauth%2Fgoogle%2Fcallback&amp;scope=openid+profile+email&amp;response_type=code'\" />\n\n        <title>Redirecting to https://accounts.google.com/o/oauth2/auth?client_id=654902117091-i72uc243ah463bgqsumsvsc60640kp3i.apps.googleusercontent.com&amp;redirect_uri=http%3A%2F%2Flocalhost%3A8000%2Fapi%2Fv1%2Fauth%2Fgoogle%2Fcallback&amp;scope=openid+profile+email&amp;response_type=code</title>\n    </head>\n    <body>\n        Redirecting to <a href=\"https://accounts.google.com/o/oauth2/auth?client_id=654902117091-i72uc243ah463bgqsumsvsc60640kp3i.apps.googleusercontent.com&amp;redirect_uri=http%3A%2F%2Flocalhost%3A8000%2Fapi%2Fv1%2Fauth%2Fgoogle%2Fcallback&amp;scope=openid+profile+email&amp;response_type=code\">https://accounts.google.com/o/oauth2/auth?client_id=654902117091-i72uc243ah463bgqsumsvsc60640kp3i.apps.googleusercontent.com&amp;redirect_uri=http%3A%2F%2Flocalhost%3A8000%2Fapi%2Fv1%2Fauth%2Fgoogle%2Fcallback&amp;scope=openid+profile+email&amp;response_type=code</a>.\n    </body>\n</html>"
      tags:
        - Authentication
      security: []
  /api/v1/auth/google/callback:
    get:
      summary: 'Google OAuth — callback'
      operationId: googleOAuthCallback
      description: "Handles Google's redirect back. Looks up the email in the system to determine\nthe user's role (student, pedagog, or admin). Unknown emails are rejected.\nOn success, redirects to the SPA with a token in the URL."
      parameters: []
      responses:
        302:
          description: ''
          content:
            text/plain:
              schema:
                oneOf:
                  -
                    description: Success
                    type: string
                    example: 'Redirects to FRONTEND_URL/auth/callback?token=...'
                  -
                    description: 'Unknown email'
                    type: string
                    example: 'Redirects to FRONTEND_URL/login?error=oauth_unknown_email'
                  -
                    description: 'OAuth error'
                    type: string
                    example: 'Redirects to FRONTEND_URL/login?error=oauth_failed'
                  -
                    description: ''
                    type: string
                    example: "<!DOCTYPE html>\n<html>\n    <head>\n        <meta charset=\"UTF-8\" />\n        <meta http-equiv=\"refresh\" content=\"0;url='http://localhost:5173/login?error=oauth_failed'\" />\n\n        <title>Redirecting to http://localhost:5173/login?error=oauth_failed</title>\n    </head>\n    <body>\n        Redirecting to <a href=\"http://localhost:5173/login?error=oauth_failed\">http://localhost:5173/login?error=oauth_failed</a>.\n    </body>\n</html>"
      tags:
        - Authentication
      security: []
  /api/v1/auth/me:
    get:
      summary: 'Get authenticated user'
      operationId: getAuthenticatedUser
      description: "Returns the currently authenticated user's profile."
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    id: 1
                    name: 'Arjan Hoxha'
                    email: arjan@uamd.edu.al
                    role: pedagog
                    avatarUrl: null
                  message: OK
                  status: 200
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: 'Arjan Hoxha'
                      email:
                        type: string
                        example: arjan@uamd.edu.al
                      role:
                        type: string
                        example: pedagog
                      avatarUrl:
                        type: string
                        example: null
                        nullable: true
                  message:
                    type: string
                    example: OK
                  status:
                    type: integer
                    example: 200
      tags:
        - Authentication
  /api/v1/auth/logout:
    post:
      summary: Logout
      operationId: logout
      description: 'Revokes the current Sanctum token.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data: null
                  message: 'Dalja u krye me sukses.'
                  status: 200
                properties:
                  data:
                    type: string
                    example: null
                    nullable: true
                  message:
                    type: string
                    example: 'Dalja u krye me sukses.'
                  status:
                    type: integer
                    example: 200
      tags:
        - Authentication
  /api/v1/auth/password:
    put:
      summary: 'Change password'
      operationId: changePassword
      description: "Updates the password for the authenticated user.\nOnly available for users who have a password (pedagog / admin)."
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data: null
                  message: 'Fjalëkalimi u ndryshua me sukses.'
                  status: 200
                properties:
                  data:
                    type: string
                    example: null
                    nullable: true
                  message:
                    type: string
                    example: 'Fjalëkalimi u ndryshua me sukses.'
                  status:
                    type: integer
                    example: 200
        422:
          description: 'Wrong current password'
          content:
            application/json:
              schema:
                type: object
                example:
                  data: null
                  message: 'Të dhënat nuk janë të sakta.'
                  status: 422
                properties:
                  data:
                    type: string
                    example: null
                    nullable: true
                  message:
                    type: string
                    example: 'Të dhënat nuk janë të sakta.'
                  status:
                    type: integer
                    example: 422
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                current_password:
                  type: string
                  description: ''
                  example: architecto
                new_password:
                  type: string
                  description: 'Must be at least 8 characters.'
                  example: ngzmiyvdljnikhwaykcmyuwpwl
              required:
                - current_password
                - new_password
  /api/v1/courses:
    get:
      summary: 'List courses'
      operationId: listCourses
      description: 'Returns all courses. Pass `department_id` to filter by department.'
      parameters:
        -
          in: query
          name: departmentId
          description: 'optional Filter by department.'
          example: 4
          required: false
          schema:
            type: integer
            description: 'optional Filter by department.'
            example: 4
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    -
                      id: 1
                      name: Algoritmika
                      code: INF101
                      departmentId: 4
                  message: 'Lëndët u morën me sukses.'
                  status: 200
                properties:
                  data:
                    type: array
                    example:
                      -
                        id: 1
                        name: Algoritmika
                        code: INF101
                        departmentId: 4
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        name:
                          type: string
                          example: Algoritmika
                        code:
                          type: string
                          example: INF101
                        departmentId:
                          type: integer
                          example: 4
                  message:
                    type: string
                    example: 'Lëndët u morën me sukses.'
                  status:
                    type: integer
                    example: 200
      tags:
        - Courses
  '/api/v1/courses/{id}':
    get:
      summary: 'Get a course'
      operationId: getACourse
      description: 'Returns a single course by its ID.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    id: 1
                    name: Algoritmika
                    code: INF101
                    departmentId: 4
                  message: 'Lënda u mor me sukses.'
                  status: 200
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: Algoritmika
                      code:
                        type: string
                        example: INF101
                      departmentId:
                        type: integer
                        example: 4
                  message:
                    type: string
                    example: 'Lënda u mor me sukses.'
                  status:
                    type: integer
                    example: 200
        404:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data: null
                  message: 'Rekordi nuk u gjet.'
                  status: 404
                properties:
                  data:
                    type: string
                    example: null
                    nullable: true
                  message:
                    type: string
                    example: 'Rekordi nuk u gjet.'
                  status:
                    type: integer
                    example: 404
      tags:
        - Courses
    parameters:
      -
        in: path
        name: id
        description: 'The ID of the course.'
        example: architecto
        required: true
        schema:
          type: string
  /api/v1/departments:
    get:
      summary: 'List departments'
      operationId: listDepartments
      description: 'Returns all departments. Pass `faculty_id` to filter by faculty.'
      parameters:
        -
          in: query
          name: facultyId
          description: 'optional Filter by faculty.'
          example: 2
          required: false
          schema:
            type: integer
            description: 'optional Filter by faculty.'
            example: 2
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    -
                      id: 4
                      name: 'Departamenti i Informatikës'
                      facultyId: 2
                  message: 'Departamentet u morën me sukses.'
                  status: 200
                properties:
                  data:
                    type: array
                    example:
                      -
                        id: 4
                        name: 'Departamenti i Informatikës'
                        facultyId: 2
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 4
                        name:
                          type: string
                          example: 'Departamenti i Informatikës'
                        facultyId:
                          type: integer
                          example: 2
                  message:
                    type: string
                    example: 'Departamentet u morën me sukses.'
                  status:
                    type: integer
                    example: 200
      tags:
        - Departments
    post:
      summary: 'Create a department'
      operationId: createADepartment
      description: ''
      parameters: []
      responses:
        501:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data: null
                  message: 'Ende nuk është implementuar.'
                  status: 501
                properties:
                  data:
                    type: string
                    example: null
                    nullable: true
                  message:
                    type: string
                    example: 'Ende nuk është implementuar.'
                  status:
                    type: integer
                    example: 501
      tags:
        - Departments
  '/api/v1/departments/{id}':
    get:
      summary: 'Get a department'
      operationId: getADepartment
      description: 'Returns a single department by its ID.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    id: 4
                    name: 'Departamenti i Informatikës'
                    facultyId: 2
                  message: 'Departamenti u mor me sukses.'
                  status: 200
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 4
                      name:
                        type: string
                        example: 'Departamenti i Informatikës'
                      facultyId:
                        type: integer
                        example: 2
                  message:
                    type: string
                    example: 'Departamenti u mor me sukses.'
                  status:
                    type: integer
                    example: 200
        404:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data: null
                  message: 'Not Found'
                  status: 404
                properties:
                  data:
                    type: string
                    example: null
                    nullable: true
                  message:
                    type: string
                    example: 'Not Found'
                  status:
                    type: integer
                    example: 404
      tags:
        - Departments
    put:
      summary: 'Update a department'
      operationId: updateADepartment
      description: ''
      parameters: []
      responses:
        501:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data: null
                  message: 'Ende nuk është implementuar.'
                  status: 501
                properties:
                  data:
                    type: string
                    example: null
                    nullable: true
                  message:
                    type: string
                    example: 'Ende nuk është implementuar.'
                  status:
                    type: integer
                    example: 501
      tags:
        - Departments
    delete:
      summary: 'Delete a department'
      operationId: deleteADepartment
      description: ''
      parameters: []
      responses:
        501:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data: null
                  message: 'Ende nuk është implementuar.'
                  status: 501
                properties:
                  data:
                    type: string
                    example: null
                    nullable: true
                  message:
                    type: string
                    example: 'Ende nuk është implementuar.'
                  status:
                    type: integer
                    example: 501
      tags:
        - Departments
    parameters:
      -
        in: path
        name: id
        description: 'The ID of the department.'
        example: architecto
        required: true
        schema:
          type: string
  /api/v1/notifications:
    get:
      summary: ''
      operationId: getApiV1Notifications
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data: null
                  message: 'Nuk jeni i autentikuar.'
                  status: 401
                properties:
                  data:
                    type: string
                    example: null
                    nullable: true
                  message:
